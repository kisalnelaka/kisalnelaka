name: Update Recent Repositories

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update Recent Repos
        run: python .github/scripts/update_recent_repos.py

      - name: Generate Tech Dashboard
        run: python .github/scripts/generate_tech_dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md tech-dashboard.svg
          git commit -m "Auto-update recent repositories and tech dashboard" || exit 0
          git push
